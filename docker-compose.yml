services:
  # PostgreSQL - Primary Database
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: codehaat
      POSTGRES_USER: codehaat
      POSTGRES_PASSWORD: codehaat_secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/01-schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codehaat -d codehaat"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis - Cache & Job Queue
  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Frontend - Next.js
  frontend:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:4001
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:4001
    depends_on:
      - core-engine
    restart: unless-stopped

  # Core Engine - Rust (Main API Gateway)
  core-engine:
    build:
      context: ./services/core-engine
      dockerfile: Dockerfile
    ports:
      - "4001:4001"
    env_file:
      - ./services/core-engine/.env
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # AI Service - Python (Recommendations & Search)
  ai-service:
    build:
      context: ./services/ai-service
      dockerfile: Dockerfile
    ports:
      - "4002:4002"
    env_file:
      - ./services/ai-service/.env
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # Infra Worker - Go (Background Jobs & GitHub)
  infra-worker:
    build:
      context: ./services/infra-worker
      dockerfile: Dockerfile
    ports:
      - "4003:4003"
    env_file:
      - ./services/infra-worker/.env
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # Real-Time Service - Node.js (WebSocket)
  realtime-service:
    build:
      context: ./services/realtime-service
      dockerfile: Dockerfile
    ports:
      - "4004:4004"
    env_file:
      - ./services/realtime-service/.env
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # SeaweedFS - Object Storage (S3-compatible)
  seaweedfs:
    image: chrislusf/seaweedfs
    container_name: seaweedfs
    ports:
      - "8333:8333"
    volumes:
      - seaweedfs_data:/data
      - ./config/seaweedfs/s3.json:/etc/seaweedfs/s3.json:ro
    command: "server -s3 -s3.port=8333 -s3.config /etc/seaweedfs/s3.json -volume.max=100 -volume.fileSizeLimitMB=64"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8333"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  redis_data:
  postgres_data:
  seaweedfs_data:
