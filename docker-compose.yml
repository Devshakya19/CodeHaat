services:
  # PostgreSQL - Primary Database
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: codehaat
      POSTGRES_USER: codehaat
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-codehaat_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/01-schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codehaat -d codehaat"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1"
    restart: unless-stopped

  # Redis - Cache & Job Queue
  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-codehaat_redis_secret}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-codehaat_redis_secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    restart: unless-stopped

  # Frontend - Next.js
  frontend:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:4001
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:4001
      - CORE_ENGINE_URL=http://core-engine:4001
      - JWT_SECRET=codehaat-super-secret-jwt-key-change-in-production-2024
      - SEAWEEDFS_URL=http://seaweedfs:8333
    depends_on:
      - core-engine
    networks:
      - frontend
      - backend
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1"
    restart: unless-stopped

  # Core Engine - Rust (Main API Gateway)
  core-engine:
    build:
      context: ./services/core-engine
      dockerfile: Dockerfile
    ports:
      - "4001:4001"
    env_file:
      - ./services/core-engine/.env
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - frontend
      - backend
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1"
    restart: unless-stopped

  # AI Service - Python (Recommendations & Search)
  ai-service:
    build:
      context: ./services/ai-service
      dockerfile: Dockerfile
    env_file:
      - ./services/ai-service/.env
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    restart: unless-stopped

  # Infra Worker - Go (Background Jobs & GitHub)
  infra-worker:
    build:
      context: ./services/infra-worker
      dockerfile: Dockerfile
    env_file:
      - ./services/infra-worker/.env
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    restart: unless-stopped

  # Real-Time Service - Node.js (WebSocket)
  realtime-service:
    build:
      context: ./services/realtime-service
      dockerfile: Dockerfile
    env_file:
      - ./services/realtime-service/.env
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - frontend
      - backend
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    restart: unless-stopped

  # SeaweedFS - Object Storage (S3-compatible)
  # Port 8333 exposed for browser uploads via presigned URL
  seaweedfs:
    image: chrislusf/seaweedfs:3.76
    ports:
      - "8333:8333"
    volumes:
      - seaweedfs_data:/data
      - ./config/seaweedfs/s3.json:/etc/seaweedfs/s3.json:ro
    command: "server -s3 -s3.port=8333 -s3.config /etc/seaweedfs/s3.json -volume.max=100 -volume.fileSizeLimitMB=64"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8333"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    networks:
      - backend
    restart: unless-stopped

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
    internal: true

volumes:
  redis_data:
  postgres_data:
  seaweedfs_data:
