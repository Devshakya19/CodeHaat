name: Setup Branch Protection

on:
  workflow_dispatch:

permissions:
  contents: write
  pull_requests: write

jobs:
  setup-protection:
    name: Configure Branch Protection
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Branch Protection Rules
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Configure branch protection for 'main'
            await github.rest.repos.updateBranchProtection({
              owner,
              repo,
              branch: 'main',
              required_status_checks: {
                strict: true,
                contexts: ['lint', 'type-check', 'build', 'rust-check']
              },
              required_pull_request_reviews: {
                required_approving_review_count: 1,
                dismiss_stale_reviews: true,
                require_code_owner_reviews: false
              },
              enforce_admins: false,
              required_linear_history: false,
              allow_force_pushes: false,
              allow_deletions: false,
              block_creations: false,
              required_conversation_resolution: false
            });

            console.log('Branch protection rules configured for main branch');

            // Delete 'master' branch if it exists (cleanup)
            try {
              await github.rest.git.deleteRef({
                owner,
                repo,
                ref: 'heads/master'
              });
              console.log('Deleted master branch');
            } catch (e) {
              console.log('master branch not found or could not be deleted:', e.message);
            }
