name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        uses: actions/github-script@v7
        with:
          script: |
            const { github, context } = context;
            const tag = context.ref.replace('refs/tags/', '');

            // Get commits since last tag
            const commits = await github.rest.repos.listCommits({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 50,
            });

            let changelog = `## What's Changed\n\n`;
            for (const commit of commits.data) {
              const message = commit.commit.message.split('\n')[0];
              changelog += `- ${message}\n`;
            }

            return changelog;

      - name: Create GitHub Release
        uses: actions/github-script@v7
        with:
          script: |
            const { github, context } = context;
            const tag = context.ref.replace('refs/tags/', '');

            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `Release ${tag}`,
              body: `## CodeHaat ${tag}\n\n${process.env.CHANGELOG}`,
              draft: false,
              prerelease: tag.includes('-rc') || tag.includes('-beta'),
            });

  docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: release
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Core Engine
        uses: docker/build-push-action@v5
        with:
          context: ./services/core-engine
          push: true
          tags: codehaat/core-engine:latest,codehaat/core-engine:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push AI Service
        uses: docker/build-push-action@v5
        with:
          context: ./services/ai-service
          push: true
          tags: codehaat/ai-service:latest,codehaat/ai-service:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Infra Worker
        uses: docker/build-push-action@v5
        with:
          context: ./services/infra-worker
          push: true
          tags: codehaat/infra-worker:latest,codehaat/infra-worker:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Real-Time Service
        uses: docker/build-push-action@v5
        with:
          context: ./services/realtime-service
          push: true
          tags: codehaat/realtime-service:latest,codehaat/realtime-service:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
