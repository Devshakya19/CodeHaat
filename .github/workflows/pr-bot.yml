name: PR Bot

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  # Auto-label PRs based on changed files
  label:
    name: Auto Label
    runs-on: ubuntu-latest
    if: github.event.action == 'opened' || github.event.action == 'synchronize'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Label PR by path
        uses: actions/github-script@v7
        with:
          script: |
            const { payload, github } = context;
            const pr = payload.pull_request;
            const labels = [];

            // Check changed files
            const files = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 100,
            });

            for (const file of files.data) {
              const path = file.filename;

              if (path.startsWith('apps/web/')) labels.push('frontend');
              if (path.startsWith('services/core-engine/')) labels.push('backend');
              if (path.startsWith('services/ai-service/')) labels.push('ai-service');
              if (path.startsWith('services/infra-worker/')) labels.push('infra-worker');
              if (path.startsWith('services/realtime-service/')) labels.push('realtime');
              if (path.startsWith('sql/')) labels.push('database');
              if (path.startsWith('.github/')) labels.push('ci-cd');
              if (path.startsWith('docs/')) labels.push('documentation');
              if (path.includes('package.json') || path.includes('Cargo.toml') || path.includes('go.mod')) labels.push('dependencies');
            }

            // Remove duplicates
            const uniqueLabels = [...new Set(labels)];

            if (uniqueLabels.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                labels: uniqueLabels,
              });
            }

  # Auto-comment on PR with checklist
  comment:
    name: PR Comment
    runs-on: ubuntu-latest
    if: github.event.action == 'opened'
    steps:
      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const { payload, github } = context;
            const pr = payload.pull_request;

            const body = `## 🤖 PR Review Checklist

            Thanks for opening this PR! Here's what will be checked:

            ### Automated Checks
            - [ ] Linting passes
            - [ ] TypeScript compilation passes
            - [ ] Build succeeds
            - [ ] Rust code compiles (if applicable)

            ### Review Checklist
            - [ ] Code follows project conventions
            - [ ] No hardcoded secrets or credentials
            - [ ] Changes are well-documented
            - [ ] Tests pass (if applicable)

            ---
            *This comment is auto-generated by CodeHaat CI Bot*`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body: body,
            });

  # Check for merge conflicts
  conflicts:
    name: Check Conflicts
    runs-on: ubuntu-latest
    if: github.event.action == 'synchronize'
    steps:
      - name: Check for merge conflicts
        uses: actions/github-script@v7
        with:
          script: |
            const { payload, github } = context;
            const pr = payload.pull_request;

            if (pr.mergeable === false) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body: '⚠️ **Merge conflicts detected!** Please resolve conflicts before merging.',
              });
            }
