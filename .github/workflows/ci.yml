name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        working-directory: apps/web
        run: npm ci

      - name: Run ESLint
        working-directory: apps/web
        run: npm run lint

  type-check:
    name: type-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        working-directory: apps/web
        run: npm ci

      - name: Run TypeScript check
        working-directory: apps/web
        run: npx tsc --noEmit

  build:
    name: build
    runs-on: ubuntu-latest
    needs: [lint, type-check]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        working-directory: apps/web
        run: npm ci

      - name: Build
        working-directory: apps/web
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}

  rust-check:
    name: rust-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Check Rust code
        working-directory: services/core-engine
        run: cargo check

      - name: Run Rust tests
        working-directory: services/core-engine
        run: cargo test

  python-check:
    name: python-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: services/ai-service
        run: |
          pip install -r requirements.txt

      - name: Lint with flake8
        working-directory: services/ai-service
        run: |
          pip install flake8
          flake8 app/ --max-line-length=120 --ignore=E501,W503

  go-check:
    name: go-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build Go code
        working-directory: services/infra-worker
        run: go build ./...

      - name: Run Go tests
        working-directory: services/infra-worker
        run: go test ./...

  node-check:
    name: node-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: services/realtime-service/package-lock.json

      - name: Install dependencies
        working-directory: services/realtime-service
        run: npm ci

      - name: Lint
        working-directory: services/realtime-service
        run: npm run lint
        continue-on-error: true

  security:
    name: security-audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Audit npm dependencies
        working-directory: apps/web
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Audit Rust dependencies
        working-directory: services/core-engine
        run: cargo audit
        continue-on-error: true

  docker-build:
    name: docker-build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Frontend Docker image
        run: docker build -t codehaat-frontend ./apps/web

      - name: Build Core Engine Docker image
        run: docker build -t codehaat-core-engine ./services/core-engine

      - name: Build AI Service Docker image
        run: docker build -t codehaat-ai-service ./services/ai-service

      - name: Build Infra Worker Docker image
        run: docker build -t codehaat-infra-worker ./services/infra-worker

      - name: Build Realtime Service Docker image
        run: docker build -t codehaat-realtime-service ./services/realtime-service
